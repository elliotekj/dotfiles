# Solarized Light theme for Yazi
# Based on https://ethanschoonover.com/solarized/

[manager]
cwd = { fg = "#268bd2" }

hovered = { reversed = true }
preview_hovered = { underline = true }

find_keyword = { fg = "#b58900", bold = true, italic = true, underline = true }
find_position = { fg = "#d33682", bg = "reset", italic = true }

marker_copied = { fg = "#859900", bg = "#859900" }
marker_cut = { fg = "#dc322f", bg = "#dc322f" }
marker_marked = { fg = "#2aa198", bg = "#2aa198" }
marker_selected = { fg = "#268bd2", bg = "#268bd2" }

tab_active = { reversed = true }
tab_inactive = {}
tab_width = 1

count_copied = { fg = "#fdf6e3", bg = "#859900" }
count_cut = { fg = "#fdf6e3", bg = "#dc322f" }
count_selected = { fg = "#fdf6e3", bg = "#268bd2" }

border_symbol = "│"
border_style = { fg = "#93a1a1" }

[status]
separator_open = ""
separator_close = ""
separator_style = { fg = "#eee8d5", bg = "#eee8d5" }

mode_normal = { fg = "#fdf6e3", bg = "#268bd2", bold = true }
mode_select = { fg = "#fdf6e3", bg = "#859900", bold = true }
mode_unset = { fg = "#fdf6e3", bg = "#d33682", bold = true }

progress_label = { bold = true }
progress_normal = { fg = "#268bd2", bg = "#eee8d5" }
progress_error = { fg = "#dc322f", bg = "#eee8d5" }

perm_type = { fg = "#268bd2" }
perm_read = { fg = "#b58900" }
perm_write = { fg = "#dc322f" }
perm_exec = { fg = "#859900" }
perm_sep = { fg = "#93a1a1" }

[input]
border = { fg = "#268bd2" }
title = {}
value = {}
selected = { reversed = true }

[pick]
border = { fg = "#268bd2" }
active = { fg = "#d33682", bold = true }
inactive = {}

[confirm]
border = { fg = "#268bd2" }
title = { fg = "#268bd2" }
content = {}
list = {}
btn_yes = { reversed = true }
btn_no = {}
btn_labels = [ "  Yes  ", "  No  " ]

[completion]
border = { fg = "#268bd2" }
active = { reversed = true }
inactive = {}

icon_file = ""
icon_folder = ""
icon_command = ""

[tasks]
border = { fg = "#268bd2" }
title = {}
hovered = { fg = "#d33682" }

[which]
cols = 3
mask = { bg = "#eee8d5" }
cand = { fg = "#2aa198" }
rest = { fg = "#93a1a1" }
desc = { fg = "#657b83" }
separator = "  "
separator_style = { fg = "#93a1a1" }

[help]
on = { fg = "#2aa198" }
run = { fg = "#d33682" }
hovered = { reversed = true }
desc = { fg = "#93a1a1" }
footer = { fg = "#657b83", bg = "#eee8d5" }

[notify]
title_info = { fg = "#268bd2" }
title_warn = { fg = "#b58900" }
title_error = { fg = "#dc322f" }

icon_info = ""
icon_warn = ""
icon_error = ""

[filetype]
rules = [
  { name = "*/", fg = "#268bd2", bold = true },

  { mime = "image/*", fg = "#2aa198" },
  { mime = "video/*", fg = "#b58900" },
  { mime = "audio/*", fg = "#b58900" },
  { mime = "application/zip", fg = "#d33682" },
  { mime = "application/gzip", fg = "#d33682" },
  { mime = "application/x-tar", fg = "#d33682" },
  { mime = "application/x-bzip2", fg = "#d33682" },
  { mime = "application/x-7z-compressed", fg = "#d33682" },
  { mime = "application/x-rar", fg = "#d33682" },
  { mime = "application/x-xz", fg = "#d33682" },

  { mime = "application/doc", fg = "#859900" },
  { mime = "application/pdf", fg = "#859900" },
  { mime = "application/rtf", fg = "#859900" },
  { mime = "application/vnd.*", fg = "#859900" },

  { name = "*.css", fg = "#2aa198" },
  { name = "*.scss", fg = "#2aa198" },
  { name = "*.htm", fg = "#cb4b16" },
  { name = "*.html", fg = "#cb4b16" },

  { name = ".git*", fg = "#93a1a1" },
  { name = ".gitignore", fg = "#93a1a1" },
  { name = "Makefile", fg = "#859900" },
  { name = "CONTRIBUTING.md", fg = "#b58900" },
  { name = "README.md", fg = "#b58900" },
  { name = "LICENSE*", fg = "#93a1a1" },
]
